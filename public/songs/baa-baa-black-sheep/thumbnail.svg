<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Simple thumbnail - green bg with black sheep face -->
  <rect width="100" height="100" fill="#C8E6C9" rx="12"/>
  <!-- Wool body hint -->
  <ellipse cx="50" cy="62" rx="28" ry="20" fill="#FAFAFA"/>
  <!-- Head -->
  <ellipse cx="50" cy="45" rx="14" ry="15" fill="#37474F"/>
  <!-- Ears -->
  <ellipse cx="38" cy="38" rx="5" ry="8" fill="#263238" transform="rotate(-15 38 38)"/>
  <ellipse cx="62" cy="38" rx="5" ry="8" fill="#263238" transform="rotate(15 62 38)"/>
  <!-- Eyes -->
  <circle cx="45" cy="45" r="3" fill="#1A1A1A"/>
  <circle cx="55" cy="45" r="3" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="46" cy="44" r="1.2" fill="white"/>
  <circle cx="56" cy="44" r="1.2" fill="white"/>
  <!-- Smile -->
  <path d="M 46 51 Q 50 55 54 51" stroke="#1A1A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
