  <ellipse cx="67" cy="38" rx="9" ry="14" fill="#6D4C41" transform="rotate(10 67 38)"/>
  <!-- Eyes -->
  <circle cx="43" cy="48" r="4" fill="#3E2723"/>
  <circle cx="57" cy="48" r="4" fill="#3E2723"/>
  <circle cx="44" cy="47" r="1.5" fill="white"/>
  <circle cx="58" cy="47" r="1.5" fill="white"/>
  <!-- Nose -->
