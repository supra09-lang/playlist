<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Grass -->
  <ellipse cx="200" cy="350" rx="160" ry="30" fill="#81C784" opacity="0.6"/>
  <!-- Dog body -->
  <ellipse cx="200" cy="250" rx="70" ry="50" fill="#8D6E63"/>
  <!-- Dog head -->
  <circle cx="200" cy="185" r="45" fill="#A1887F"/>
  <!-- Ears -->
  <ellipse cx="165" cy="160" rx="20" ry="30" fill="#6D4C41" transform="rotate(-15 165 160)"/>
  <ellipse cx="235" cy="160" rx="20" ry="30" fill="#6D4C41" transform="rotate(15 235 160)"/>
  <!-- Eyes -->
  <circle cx="185" cy="185" r="8" fill="#3E2723"/>
  <circle cx="215" cy="185" r="8" fill="#3E2723"/>
  <!-- Eye shine -->
  <circle cx="187" cy="183" r="3" fill="white"/>
  <circle cx="217" cy="183" r="3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="200" cy="200" rx="10" ry="8" fill="#3E2723"/>
  <!-- Tongue -->
  <ellipse cx="200" cy="215" rx="7" ry="10" fill="#EF9A9A"/>
  <!-- Tail -->
  <path d="M 270 240 Q 310 200 290 170" stroke="#8D6E63" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="170" y="285" width="15" height="35" fill="#6D4C41" rx="7"/>
  <rect x="215" y="285" width="15" height="35" fill="#6D4C41" rx="7"/>
  <!-- Collar -->
  <rect x="165" y="220" width="70" height="12" fill="#EF5350" rx="6"/>
  <circle cx="200" cy="232" r="6" fill="#FFD54F"/>
  <!-- Music notes -->
  <text x="50" y="100" font-size="30" opacity="0.6">🎵</text>
  <text x="310" y="90" font-size="28" opacity="0.5">🎶</text>
  <text x="70" cy="300" y="300" font-size="24" opacity="0.5">♪</text>
  <!-- Paw prints -->
  <circle cx="100" cy="360" r="5" fill="#6D4C41" opacity="0.3"/>
  <circle cx="90" cy="350" r="3" fill="#6D4C41" opacity="0.3"/>
  <circle cx="110" cy="350" r="3" fill="#6D4C41" opacity="0.3"/>
  <circle cx="300" cy="365" r="5" fill="#6D4C41" opacity="0.3"/>
  <circle cx="290" cy="355" r="3" fill="#6D4C41" opacity="0.3"/>
  <circle cx="310" cy="355" r="3" fill="#6D4C41" opacity="0.3"/>
</svg>
