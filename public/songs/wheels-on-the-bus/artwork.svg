<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <linearGradient id="bus-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDD835"/>
      <stop offset="100%" style="stop-color:#F9A825"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Clouds -->
  <ellipse cx="80" cy="70" rx="40" ry="20" fill="white" opacity="0.7"/>
  <ellipse cx="110" cy="65" rx="30" ry="18" fill="white" opacity="0.7"/>
  <ellipse cx="300" cy="90" rx="35" ry="18" fill="white" opacity="0.6"/>
  <ellipse cx="330" cy="85" rx="25" ry="15" fill="white" opacity="0.6"/>
  <!-- Road -->
  <rect x="0" y="310" width="400" height="90" fill="#78909C" rx="0"/>
  <rect x="30" y="350" width="40" height="6" fill="#ECEFF1" rx="3"/>
  <rect x="110" y="350" width="40" height="6" fill="#ECEFF1" rx="3"/>
  <rect x="190" y="350" width="40" height="6" fill="#ECEFF1" rx="3"/>
  <rect x="270" y="350" width="40" height="6" fill="#ECEFF1" rx="3"/>
  <rect x="350" y="350" width="40" height="6" fill="#ECEFF1" rx="3"/>
  <!-- Bus body -->
  <rect x="60" y="170" width="280" height="140" fill="url(#bus-body)" rx="15"/>
  <!-- Bus roof -->
  <rect x="70" y="155" width="260" height="25" fill="#F57F17" rx="12"/>
  <!-- Windows -->
  <rect x="85" y="195" width="50" height="45" fill="#E3F2FD" rx="8"/>
  <rect x="150" y="195" width="50" height="45" fill="#E3F2FD" rx="8"/>
  <rect x="215" y="195" width="50" height="45" fill="#E3F2FD" rx="8"/>
  <rect x="280" y="195" width="45" height="45" fill="#E3F2FD" rx="8"/>
  <!-- Door -->
  <rect x="145" y="260" width="40" height="50" fill="#E3F2FD" rx="5"/>
  <circle cx="178" cy="285" r="4" fill="#78909C"/>
  <!-- Bumper -->
  <rect x="55" y="300" width="290" height="12" fill="#F57F17" rx="6"/>
  <!-- Headlights -->
  <circle cx="75" cy="270" r="12" fill="#FFF9C4"/>
  <circle cx="330" cy="270" r="12" fill="#EF5350"/>
  <!-- Wheels -->
  <circle cx="120" cy="315" r="28" fill="#37474F"/>
  <circle cx="120" cy="315" r="15" fill="#78909C"/>
  <circle cx="120" cy="315" r="6" fill="#37474F"/>
  <circle cx="290" cy="315" r="28" fill="#37474F"/>
  <circle cx="290" cy="315" r="15" fill="#78909C"/>
  <circle cx="290" cy="315" r="6" fill="#37474F"/>
  <!-- Cute faces in windows -->
  <circle cx="105" cy="215" r="6" fill="#FFAB91"/>
  <circle cx="115" cy="215" r="6" fill="#CE93D8"/>
  <circle cx="170" cy="215" r="6" fill="#80CBC4"/>
  <circle cx="180" cy="215" r="6" fill="#FFF176"/>
  <!-- Sun -->
  <circle cx="350" cy="50" r="30" fill="#FFD54F" opacity="0.8"/>
  <!-- Sun rays -->
  <line x1="350" y1="10" x2="350" y2="20" stroke="#FFD54F" stroke-width="3" opacity="0.6"/>
  <line x1="380" y1="50" x2="390" y2="50" stroke="#FFD54F" stroke-width="3" opacity="0.6"/>
  <line x1="375" y1="25" x2="382" y2="18" stroke="#FFD54F" stroke-width="3" opacity="0.6"/>
  <line x1="375" y1="75" x2="382" y2="82" stroke="#FFD54F" stroke-width="3" opacity="0.6"/>
  <!-- STOP sign -->
  <rect x="55" y="240" width="8" height="25" fill="#EF5350"/>
</svg>
